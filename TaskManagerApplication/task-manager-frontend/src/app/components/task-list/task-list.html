<div class="task-list">
<app-task-create-form (taskCreated)="onTaskCreated($event)">
    </app-task-create-form>
    @if (tasks$ | async; as tasks) {
        @if (tasks.length === 0) {
            <p>Loading Tasks...</p>
        }
        @else if (errorMessage) {
            <p>{{ errorMessage }}</p>
        }
        @else {
                @if (tasks.length === 0) {
                    <p>No tasks available.</p>
                } @else {
                    @for (task of tasks; track task.id) {
                        <app-task-item
                            [task]="task"
                            (completedToggle)="onCompletedTask($event)"
                            (taskDeleted)="onTaskDeleted($event)"
                            (priorityChanged)="onTaskPriorityChanged($event.taskId, $event.priority)"
                        >
                        </app-task-item>
                    }
                }
            }
    }
</div>
